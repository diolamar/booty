<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSV Registration</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f4f7fb;
        margin: 0;
        padding: 40px 20px;
      }

      .card {
        max-width: 520px;
        margin: 0 auto;
        background: #ffffff;
        border-radius: 12px;
        padding: 24px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      }

      h1 {
        margin-top: 0;
        color: #1f3c88;
      }

      label {
        display: block;
        margin: 14px 0 6px;
        font-weight: bold;
      }

      input {
        width: 100%;
        padding: 10px;
        border: 1px solid #cfd7e6;
        border-radius: 8px;
        box-sizing: border-box;
      }

      button,
      a.button-link {
        display: inline-block;
        margin-top: 18px;
        padding: 10px 16px;
        border: none;
        border-radius: 8px;
        background: #1f3c88;
        color: #ffffff;
        text-decoration: none;
        cursor: pointer;
      }

      a.button-link {
        background: #4f7cff;
        margin-left: 8px;
      }

      .flash {
        padding: 12px;
        border-radius: 8px;
        margin-bottom: 16px;
      }

      .flash.success {
        background: #e9f9ef;
        color: #166534;
      }

      .flash.danger {
        background: #fdecec;
        color: #991b1b;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Register User</h1>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
      {% endwith %}

      <form method="POST">
        <label for="full_name">Full Name</label>
        <input id="full_name" name="full_name" type="text" required />

        <label for="email">Email</label>
        <input id="email" name="email" type="email" required />

        <label for="phone">Phone</label>
        <input id="phone" name="phone" type="text" required />

        <button type="submit">Save to CSV</button>
        <a class="button-link" href="{{ url_for('registrations') }}">View Saved Records</a>
      </form>
    </div>
  </body>
</html>
