<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Saved Registrations</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f7f9fc;
        margin: 0;
        padding: 40px 20px;
      }

      .card {
        max-width: 900px;
        margin: 0 auto;
        background: #ffffff;
        border-radius: 12px;
        padding: 24px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      }

      h1 {
        margin-top: 0;
        color: #1f3c88;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 18px;
      }

      th,
      td {
        border: 1px solid #d9e2f1;
        padding: 12px;
        text-align: left;
      }

      th {
        background: #eef4ff;
      }

      a {
        display: inline-block;
        margin-top: 16px;
        text-decoration: none;
        color: #1f3c88;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Saved Registrations</h1>

      <table>
        <thead>
          <tr>
            <th>Full Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Registered At</th>
          </tr>
        </thead>
        <tbody>
          {% for row in rows %}
          <tr>
            <td>{{ row.full_name }}</td>
            <td>{{ row.email }}</td>
            <td>{{ row.phone }}</td>
            <td>{{ row.registered_at }}</td>
          </tr>
          {% else %}
          <tr>
            <td colspan="4">No registrations saved yet.</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>

      <a href="{{ url_for('register') }}">Back to Register Form</a>
    </div>
  </body>
</html>
