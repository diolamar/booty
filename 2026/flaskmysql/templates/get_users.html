{% extends 'base.html' %} {% block title %}All Users{% endblock %} {% block
content %}
<h2>The list of all users</h2>
<table class="table mt-3">
  <thead>
    <tr>
      <th>Email</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody>
    {% for user in users %}
    <tr>
      <td>{{ user.email }}</td>
      <td>
        <a
          href="{{ url_for('get_user_page', id=user.id) }}"
          class="btn btn-warning btn-sm"
          >View User Details</a
        >
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
