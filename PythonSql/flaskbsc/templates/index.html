{% extends 'base.html' %}

{% block head %}
<title>home</title>
{% endblock %}

    
{% block body %}
<a href="/add-post" class="btn btn-primary" style="float:right;">Add Post</a>
<br>
        <div>
            <table class="table table-striped">
                <thead> 
                    <tr>
                        <th>Title</th>
                        <th>Description</th>
                        <th>Author</th>
                        <th colspan="2">Action</th>
                    </tr>
                </thead>
                <tbody>
                    {% for post in posts %}
                    <tr>
                        <td>{{post[1]}}</td>
                        <td>{{post[2]}}</td>
                        <td>{{post[3]}}</td>
                        <td><a href="/api/delete/{{post[0]}}" onclick="return confirm('Are You Sure For Delete?')" class="btn btn-danger">Delete</a></td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
   
{% endblock %}
