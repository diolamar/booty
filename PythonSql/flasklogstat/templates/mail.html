<script src="../static/js/canvasjs.min.js"></script>

<script type="text/javascript">
  window.onload = function () {
      var chart = new CanvasJS.Chart("chartContainer", {
          title:{
              text: "Monthly Hits for Mail Services 2020"              
          },
          
          data: [ 
          {
              // Change type to "doughnut", "line", "splineArea", "bar", "area", "pie" etc.
              type: "column",
              labelAngle:0,
              dataPoints: [
            {% for item in x %}
            {label: "{{ item.1 }}",
            labelFontWeight: "bold",
            labelFontSize: 15,
            y: {{item.2}},
            indexLabel: "{{ item.2 }}", 
            indexLabelFontColor: "indigo"},
            {% endfor %}								
              ]
          } 
          ]
      });
      chart.render();
  }
  </script>
